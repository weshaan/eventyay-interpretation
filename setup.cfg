[coverage:run]
source = interpretation
omit = */migrations/*,*/urls.py,*/tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __str__
    der __repr__
    if settings.DEBUG
    NOQA
    NotImplementedError

[check-manifest]
ignore =
    .update-locales.sh
    .install-hooks.sh
    pretixplugin.toml
    Makefile
    manage.py
    tests/*
	*.po
	.gitkeep
